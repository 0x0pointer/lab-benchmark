apiVersion: v1
kind: Namespace
metadata:
  name: kong
  labels:
    name: kong
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong-gateway
  namespace: kong
  labels: { app: kong-gateway }
spec:
  replicas: 1
  selector:
    matchLabels: { app: kong-gateway }
  template:
    metadata:
      labels: { app: kong-gateway }
    spec:
      containers:
        - name: kong
          image: kong:3.6
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /kong/declarative/kong.yaml
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
            # Admin API stays ClusterIP-only here. The EXT-KONG-ADMIN-EXPOSED profile
            # (Phase 6) is the variant that deliberately exposes it.
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_STATUS_LISTEN
              value: "0.0.0.0:8100"
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            - name: KONG_LOG_LEVEL
              value: notice
            - name: KONG_HEADERS
              value: "off"               # don't advertise Kong (server_tokens off)
            - name: KONG_SSL_CERT
              value: /etc/secrets/kong-proxy-tls/tls.crt
            - name: KONG_SSL_CERT_KEY
              value: /etc/secrets/kong-proxy-tls/tls.key
          ports:
            - { name: proxy, containerPort: 8000 }
            - { name: proxy-tls, containerPort: 8443 }
            - { name: admin, containerPort: 8001 }
            - { name: status, containerPort: 8100 }
          readinessProbe:
            httpGet: { path: /status, port: 8100 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /status, port: 8100 }
            initialDelaySeconds: 15
            periodSeconds: 15
          volumeMounts:
            - name: kong-config
              mountPath: /kong/declarative
              readOnly: true
            - name: kong-proxy-tls
              mountPath: /etc/secrets/kong-proxy-tls
              readOnly: true
          resources:
            limits: { memory: 512Mi, cpu: 500m }
            requests: { memory: 128Mi, cpu: 100m }
      volumes:
        - name: kong-config
          configMap: { name: kong-config }
        - name: kong-proxy-tls
          secret:
            secretName: kong-proxy-tls-secret   # issued by cert-manager (see ../cert-manager)
---
apiVersion: v1
kind: Service
metadata:
  name: kong-gateway-proxy
  namespace: kong
spec:
  type: NodePort
  selector: { app: kong-gateway }
  ports:
    - { name: kong-proxy, port: 80, targetPort: 8000, nodePort: 30080 }
    - { name: kong-proxy-tls, port: 443, targetPort: 8443, nodePort: 30443 }
---
apiVersion: v1
kind: Service
metadata:
  name: kong-gateway-admin
  namespace: kong
spec:
  type: ClusterIP            # NOT exposed (Phase-6 EXT-KONG-ADMIN-EXPOSED is the exposed variant)
  selector: { app: kong-gateway }
  ports:
    - { name: admin, port: 8001, targetPort: 8001 }
