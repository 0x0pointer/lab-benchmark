# Self-signed CA -> lab CA -> TLS cert for Kong's proxy. Mirrors the blog; this is how
# internal financial infra issues service TLS. PREREQUISITE: cert-manager itself must be
# installed first (`make cert-manager-install`) so its CRDs + the cert-manager namespace exist.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lab-ca
  namespace: cert-manager        # CA issuer reads its secret from cert-manager's namespace
spec:
  isCA: true
  commonName: lab-ca
  secretName: lab-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: lab-ca-issuer
spec:
  ca:
    secretName: lab-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kong-proxy-tls
  namespace: kong
spec:
  secretName: kong-proxy-tls-secret    # mounted by the Kong deployment
  issuerRef:
    name: lab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - vuln-bank.local
    - "*.vuln-bank.local"
    - localhost
  ipAddresses:
    - 127.0.0.1
    # For nodeip access add the node's public IP here (template from the TF output —
    # the blog's hardcoded SAN breaks on every recreated node). PLAN.md §8.5.
