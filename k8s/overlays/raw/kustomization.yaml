apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# raw profile = base + direct NodePort. No Kong, no NetworkPolicy restrictions.
resources:
  - ../../base
  - nodeport.yaml

# Pin the lab image. After `image/build-push.sh`, set `digest` to the @sha256 it
# printed (then drop newTag — digest pinning is what makes ground truth reproducible).
images:
  - name: registry.digitalocean.com/CHANGEME/vuln-bank
    newName: registry.digitalocean.com/foundry-registry/vuln-bank
    digest: sha256:19f12f707f7fd3801af83fba884a45885ca46b4e1b12ad96f4bb248a51e8b96d

# LAB_PROFILE=raw is already the base default; no patch needed here.
