# raw profile exposure: NodePort straight to the app (no Kong, no controls).
# This is the recall baseline ("can agent-smith find it at all?"). Reachable ONLY
# from allowed_source_cidrs via the Terraform firewall (PLAN.md §8.2) — never 0.0.0.0/0.
apiVersion: v1
kind: Service
metadata:
  name: vuln-bank-raw
  namespace: vuln-bank
spec:
  type: NodePort
  selector: { app: vuln-bank }
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30081
