# PostgreSQL — database tier (vuln-bank-db ns).
# Bench mode: EPHEMERAL storage (emptyDir) so every run starts from a clean init_db()
# reseed — persistence is the enemy of deterministic scoring (PLAN.md §6 / decision 5).
# A persistent-PVC overlay can be added for manual demo/exploration.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: vuln-bank-db
type: Opaque
stringData:
  # Intentionally simple lab credential (mirrors the blog). NOT a real secret.
  username: postgres
  password: LabPass2024!
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: vuln-bank-db
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres, tier: database }
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          # Log every EXECUTED statement to stdout so the oracle can prove SQLi reached the
          # DB (logparse.parse_pg_log -> DB_SQLI_EXEC). warning min-level keeps the noise down.
          args: ["-c", "log_statement=all", "-c", "log_min_messages=warning"]
          env:
            - name: POSTGRES_DB
              value: vulnerable_bank
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: postgres-secret, key: username } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-secret, key: password } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "postgres", "-d", "vulnerable_bank"] }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits: { memory: 512Mi, cpu: 500m }
            requests: { memory: 256Mi, cpu: 100m }
      volumes:
        - name: pgdata
          emptyDir: {}            # ephemeral — wiped on pod recreate (deterministic reseed)
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: vuln-bank-db
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None               # headless, like the blog
