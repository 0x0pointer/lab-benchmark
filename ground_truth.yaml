    title: SQL injection in primary login (auth bypass + admin JWT)
    owasp: "A03:2021-Injection"
    cwe: CWE-89
    endpoint: {method: POST, path: /login, param: username}
    source_ref: app.py:383
    severity: critical
    detection_difficulty: easy
    exposure: {raw: reachable, hardened: reachable}   # /login is rate-limited, not blocked
    oracle_signals:
      - {type: canary,   ref: SQLI_CANARY_ROW,            strength: proves-exploit}
      - {type: pg_audit, ref: select_users_union_or_tautology, strength: proves-exploit}
      - {type: app_mw,   ref: login_tautology,            strength: proves-attempt}
    match_hints: ["sql injection", "sqli", "login", "auth bypass", "authentication bypass", "or '1'='1", "tautology", "admin jwt"]
    must_find: true

