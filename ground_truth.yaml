# ============================================================================
# ground_truth.yaml — Authoritative vulnerability catalog for the VulnBank
# detection benchmark.  THIS FILE IS THE SOURCE OF TRUTH.
#
# Purpose: every intentional vulnerability in VulnBank (+ lab extensions) is
# recorded here ONCE, with everything the oracle needs to decide — per run —
# whether agent-smith FOUND it (reported) and EXPLOITED it (server-side proof).
#
# Counting granularity: endpoint/injection-point level for injection &
# access-control classes (finding SQLi on /login is a different discovery than
# on /graphql); single ID for app-wide config issues.  Near-duplicate findings
# from agent-smith collapse onto one `id` here (the dedup denominator).
#
# Field reference
#   id            : stable canonical identifier (VB-* core, EXT-* extensions)
#   title         : human label
#   owasp / cwe   : classification (drives the oracle's class-match)
#   endpoint      : {method, path, param}  — path is the RAW app path
#   source_ref    : file:line in github.com/Commando-X/vuln-bank (pinned commit in versions.txt)
#   severity      : critical | high | medium | low | info
#   detection_difficulty : easy | medium | hard  — sets realistic expectation, NOT the gate
#   exposure      : per-profile reachability
#                     raw      : reachable            (always, by design)
#                     hardened : reachable | mitigated | blocked
#                   A `blocked` vuln is N/A (excluded from recall), never a miss.
#                   A `mitigated` vuln is still present but a control reduces it (rate-limit).
#   oracle_signals: how exploitation is PROVEN at runtime (built in Phase 4)
#                     type     : canary | pg_audit | app_mw | kong_log | falco | oob | oracle_probe | report
#                     strength : proves-exploit | proves-attempt | proof-by-oracle-probe | reported-only
#   match_hints   : keywords/phrases used by the deterministic Tier-1 matcher to
#                   map an agent-smith finding onto this id (derived from real titles)
#   must_find     : true => part of the STRICT regression gate (TP in EVERY run)
#   runtime       : live (default) | source-only (present in code, not runtime-reachable)
#   enabled       : true (default) | false (extension not yet deployed)
#   notes         : nuances (esp. the blog's Kong block-list gaps)
# ============================================================================

meta:
  app: VulnBank
  app_repo: https://github.com/Commando-X/vuln-bank
  app_commit: TBD            # pin in versions.txt at Phase 1 image build
  schema_version: 1
  profiles: [raw, hardened]
  # Kong (hardened) request-termination 404 paths (from the blog kong.yaml):
  #   /internal  /api/admin  /api/docs  /static/openapi.json
  # Kong rate-limit (20/min): /login /register /api/v*/forgot-password /api/v*/reset-password
  # IMPORTANT GATEWAY GAPS (encoded below as hardened: reachable):
  #   - real admin routes are /admin/* and /sup3r_s3cr3t_admin (NOT /api/admin) -> NOT blocked
  #   - /debug/users (full creds dump) -> NOT blocked
  kong_blocked_prefixes: [/internal, /api/admin, /api/docs, /static/openapi.json]
  kong_ratelimited_prefixes: [/login, /register, /api/v1/forgot-password, /api/v2/forgot-password,
                              /api/v3/forgot-password, /api/v1/reset-password, /api/v2/reset-password,
                              /api/v3/reset-password]

